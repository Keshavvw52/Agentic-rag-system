services:
  mongodb:
    image: mongo:7
    container_name: agentic-rag-mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentic-rag-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      CHROMA_PERSIST_DIR: /app/data/chroma
      FRONTEND_URL: http://localhost:8080
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/data/chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentic-rag-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongodb_data:
  chroma_data:
